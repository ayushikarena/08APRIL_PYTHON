<!DOCTYPE html>
<html>

<head>

<title>Buyer Dashboard</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

.header{
background:#ff6600;
padding:20px;
color:white;
}

.card{
background:white;
width:250px;
display:inline-block;
padding:20px;
margin:25px;
box-shadow:0 0 10px gray;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h1>Buyer Dashboard</h1>

<p>Hello {{ request.user.username }}</p>

</div>

<div class="card">

<h3>Order History</h3>

<p>View Previous Orders</p>

</div>

<div class="card">

<h3>Wishlist</h3>

<p>Your Favourite Products</p>

</div>

<div class="card">

<h3>Track Orders</h3>

<p>Track Live Delivery</p>

</div>

</body>

</html>
