<!DOCTYPE html>
<html>

<head>

<title>Seller Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.header{
background:#28a745;
color:white;
padding:20px;
}

.card{
background:white;
width:250px;
padding:20px;
margin:30px;
display:inline-block;
box-shadow:0 0 10px gray;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h1>Seller Dashboard</h1>

<p>Welcome {{ request.user.username }}</p>

</div>

<div class="card">

<h3>Manage Products</h3>

<p>Add New Products</p>

</div>

<div class="card">

<h3>Orders</h3>

<p>View Customer Orders</p>

</div>

<div class="card">

<h3>Sales</h3>

<p>Today's Revenue</p>

</div>

</body>

</html>
