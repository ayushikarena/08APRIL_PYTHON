<!DOCTYPE html>
<html>
<head>
<title>Post Product</title>

<style>

body{
background:#eef2f3;
font-family:Arial;
}

.container{
width:450px;
margin:50px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:green;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:darkgreen;
}

</style>

</head>

<body>

<div class="container">

<h2>Post Product</h2>

<form>

<input type="text" placeholder="Product Name">

<input type="number" placeholder="Price">

<input type="text" placeholder="Category">

<button>Post Product</button>

</form>

</div>

</body>
</html>
