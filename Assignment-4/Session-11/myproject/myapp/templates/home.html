<!DOCTYPE html>
<html>
<head>
    <title>Home</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .container{
            width:400px;
            margin:100px auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,.15);
            text-align:center;
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        a{
            display:inline-block;
            text-decoration:none;
            background:#0095f6;
            color:white;
            padding:12px 25px;
            border-radius:8px;
            margin:10px;
            transition:.3s;
        }

        a:hover{
            background:#0077c8;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Welcome</h1>

<a href=\profile>Profile</a>


</div>

</body>
</html>
