<!DOCTYPE html>
<html>

<head>

<title>Edit Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#f4f4f4;

}

.container{

width:500px;
margin:50px auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.15);

}

h2{

text-align:center;
margin-bottom:25px;

}

input,
textarea{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;

}

button{

width:100%;
padding:12px;
background:#0095f6;
color:white;
border:none;
font-size:17px;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#0077c8;

}

</style>

</head>

<body>

<div class="container">

<h2>Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Save Changes

</button>

</form>

</div>

</body>

</html>
