<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:380px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,.15);

}

h2{

text-align:center;
margin-bottom:25px;
color:#333;

}

input{

width:100%;
padding:12px;
margin-top:8px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;

}

button{

width:100%;
padding:12px;
background:#0095f6;
border:none;
color:white;
font-size:17px;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#0077c8;

}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Login

</button>

</form>

</div>

</body>

</html>
