<!DOCTYPE html>
<html>
<head>

<title>Edit Product</title>

<style>

body{

    background:#f1f3f6;
    font-family:Arial;

}

.container{

    width:450px;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;

}

h2{

    text-align:center;
    color:#2874F0;

}

input{

    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:20px;

}

button{

    width:100%;
    padding:12px;
    background:orange;
    color:white;
    border:none;
    cursor:pointer;

}

button:hover{

    background:darkorange;

}

a{

    display:block;
    text-align:center;
    margin-top:20px;
    text-decoration:none;
    color:#2874F0;

}

</style>

</head>

<body>

<div class="container">

<h2>Edit Product</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">

Update Product

</button>

</form>

<a href="/">Back to Product List</a>

</div>

</body>
</html>
