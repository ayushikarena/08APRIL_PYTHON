<!DOCTYPE html>
<html>
<head>

<title>Product List</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f1f3f6;
}

.header{

    background:#2874F0;
    color:white;
    padding:20px;
    text-align:center;

}

.container{

    width:90%;
    margin:auto;
    margin-top:30px;

}

.add{

    padding:10px 18px;
    background:green;
    color:white;
    text-decoration:none;
    border-radius:5px;

}

table{

    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;

}

th{

    background:#2874F0;
    color:white;
    padding:15px;

}

td{

    padding:15px;
    text-align:center;
    border-bottom:1px solid lightgray;

}

.edit{

    background:orange;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:4px;

}

.delete{

    background:red;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:4px;

}

.edit:hover{

    background:darkorange;

}

.delete:hover{

    background:darkred;

}

</style>

</head>

<body>

<div class="header">

<h2>Flipkart Product Management</h2>

</div>

<div class="container">

<a href="/add/" class="add">+ Add Product</a>

<table>

<tr>

<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Action</th>

</tr>

{% for product in products %}

<tr>

<td>{{ product.name }}</td>

<td>₹ {{ product.price }}</td>

<td>{{ product.category }}</td>

<td>

<a href="/edit/{{ product.id }}" class="edit">Edit</a>

<a href="/delete/{{ product.id }}" class="delete">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
