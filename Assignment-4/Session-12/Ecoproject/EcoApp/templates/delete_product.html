<!DOCTYPE html>
<html>
<head>

<title>Delete Product</title>

<style>

body{

    background:#f1f3f6;
    font-family:Arial;

}

.container{

    width:500px;
    margin:100px auto;
    background:white;
    padding:40px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 0 10px gray;

}

h2{

    color:red;

}

button{

    background:red;
    color:white;
    padding:12px 25px;
    border:none;
    cursor:pointer;
    border-radius:5px;
    font-size:16px;

}

button:hover{

    background:darkred;

}

.cancel{

    background:green;
    color:white;
    padding:12px 25px;
    text-decoration:none;
    border-radius:5px;
    margin-left:20px;

}

.cancel:hover{

    background:darkgreen;

}

</style>

</head>

<body>

<div class="container">

<h2>Delete Product</h2>

<p>

Are you sure you want to delete

<b>{{ product.name }}</b> ?

</p>

<form method="POST">

{% csrf_token %}

<button type="submit">

Yes, Delete

</button>

<a href="/" class="cancel">

Cancel

</a>

</form>

</div>

</body>
</html>
