<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <style>

        body{
            font-family:Arial;
            background:#f1f3f6;
            margin:0;
        }

        .container{
            width:450px;
            margin:60px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
            color:#2874F0;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2874F0;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#0b58d0;
        }

        a{
            text-decoration:none;
            color:#2874F0;
            display:block;
            text-align:center;
            margin-top:20px;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Add Product</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Save Product</button>

</form>

<a href="/">View Products</a>

</div>

</body>
</html>
