<!DOCTYPE html>
<html>
<head>
    <title>Profile List</title>
</head>
<body>

<h2>Social Profiles</h2>

<a href="/create/">Add Profile</a>

|

<a href="/export/">Export CSV</a>

<hr>

<table border="1">

<tr>

<th>Name</th>

<th>Email</th>

<th>Age</th>

<th>City</th>

<th>Edit</th>

</tr>

{% for profile in profiles %}

<tr>

<td>{{ profile.name }}</td>

<td>{{ profile.email }}</td>

<td>{{ profile.age }}</td>

<td>{{ profile.city }}</td>

<td>

<a href="/edit/{{ profile.id }}/">

Edit

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="5">

No Profiles Found

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
